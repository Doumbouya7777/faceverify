<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#000000">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>FaceVerify</title>
<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    -webkit-tap-highlight-color: transparent;
}

html, body {
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: #000;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    touch-action: none;
}

#video { 
    position: fixed;
    top: 0;
    left: 0;
    width: 100%; 
    height: 100%; 
    object-fit: cover; 
    transform: scaleX(-1);
    z-index: 1;
}

#oval { 
    position: fixed;
    top: 50%; 
    left: 50%; 
    transform: translate(-50%, -50%);
    width: 280px;
    height: 360px;
    border: 3px solid #00C853;
    border-radius: 50%;
    box-shadow: 0 0 0 9999px rgba(0, 0, 0, 0.75);
    z-index: 10;
    transition: all 0.3s ease;
}

#oval.success {
    border-color: #00C853;
    box-shadow: 0 0 0 9999px rgba(0, 0, 0, 0.75), 0 0 30px rgba(0, 200, 83, 0.6);
}

#oval.error {
    border-color: #FF5252;
    box-shadow: 0 0 0 9999px rgba(0, 0, 0, 0.75), 0 0 20px rgba(255, 82, 82, 0.4);
}

@keyframes pulse {
    0% { transform: translate(-50%, -50%) scale(1); }
    50% { transform: translate(-50%, -50%) scale(1.02); }
    100% { transform: translate(-50%, -50%) scale(1); }
}

#oval.scanning {
    animation: pulse 1.5s infinite;
}

#info { 
    position: fixed;
    top: 60px; 
    left: 50%; 
    transform: translateX(-50%);
    color: white; 
    font-size: 22px;
    font-weight: 700;
    text-align: center;
    z-index: 20;
    text-shadow: 0 2px 10px rgba(0,0,0,0.5);
    width: 90%;
}

#instructions {
    position: fixed;
    bottom: 140px;
    left: 50%;
    transform: translateX(-50%);
    color: rgba(255,255,255,0.9);
    font-size: 16px;
    text-align: center;
    background: rgba(0, 0, 0, 0.6);
    padding: 14px 28px;
    border-radius: 30px;
    z-index: 20;
    backdrop-filter: blur(10px);
}

#progress-container {
    position: fixed;
    bottom: 80px;
    left: 50%;
    transform: translateX(-50%);
    width: 240px;
    height: 6px;
    background: rgba(255, 255, 255, 0.2);
    border-radius: 3px;
    overflow: hidden;
    z-index: 20;
}

#progress-bar {
    width: 0%;
    height: 100%;
    background: linear-gradient(90deg, #00C853, #69F0AE);
    border-radius: 3px;
    transition: width 0.3s ease;
}

#close-btn {
    position: fixed;
    top: 20px;
    right: 20px;
    width: 44px;
    height: 44px;
    background: rgba(255, 255, 255, 0.15);
    border: none;
    border-radius: 50%;
    color: white;
    font-size: 20px;
    cursor: pointer;
    z-index: 30;
    backdrop-filter: blur(10px);
    display: flex;
    align-items: center;
    justify-content: center;
}

#start-screen {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: #000;
    z-index: 100;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    color: white;
    padding: 40px;
    text-align: center;
}

#start-screen.hidden {
    display: none;
}

#start-btn {
    margin-top: 40px;
    padding: 18px 50px;
    background: #00C853;
    color: white;
    border: none;
    border-radius: 30px;
    font-size: 18px;
    font-weight: 600;
    cursor: pointer;
}

.logo {
    width: 80px;
    height: 80px;
    background: #00C853;
    border-radius: 20px;
    margin-bottom: 30px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 40px;
}

#result-screen {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: #000;
    z-index: 90;
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    color: white;
}

#result-screen.show {
    display: flex;
}

#result-img {
    width: 280px;
    height: 360px;
    border-radius: 50%;
    object-fit: cover;
    border: 4px solid #00C853;
    margin-bottom: 30px;
}

#countdown {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    font-size: 120px;
    font-weight: 700;
    color: white;
    z-index: 50;
    display: none;
    text-shadow: 0 0 30px rgba(0,200,83,0.8);
}
</style>
</head>
<body>

<div id="start-screen">
    <div class="logo">&#10003;</div>
    <h1>Verification d'identite</h1>
    <p style="margin-top: 20px; color: #aaa; line-height: 1.6;">
        Nous allons prendre une photo de votre visage pour verifier votre identite.<br><br>
        Assurez-vous d'etre dans un endroit bien eclaire.
    </p>
    <button id="start-btn">Commencer</button>
</div>

<video id="video" playsinline autoplay muted></video>

<div id="oval"></div>
<div id="info">Centre ton visage</div>
<div id="instructions">Place ton visage dans le cadre</div>
<div id="progress-container">
    <div id="progress-bar"></div>
</div>
<div id="countdown">3</div>
<button id="close-btn">&#10005;</button>

<div id="result-screen">
    <img id="result-img" src="" alt="Capture">
    <h2>Verification reussie !</h2>
    <p style="margin-top: 15px; color: #aaa;">Votre identite a ete confirmee.</p>
    <button id="restart-btn" style="margin-top: 30px; padding: 15px 40px; background: #00C853; color: white; border: none; border-radius: 25px; font-size: 16px;">Recommencer</button>
</div>

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>

<script>
const video = document.getElementById('video');
const oval = document.getElementById('oval');
const info = document.getElementById('info');
const instructions = document.getElementById('instructions');
const progressBar = document.getElementById('progress-bar');
const startScreen = document.getElementById('start-screen');
const startBtn = document.getElementById('start-btn');
const resultScreen = document.getElementById('result-screen');
const resultImg = document.getElementById('result-img');
const countdownEl = document.getElementById('countdown');
const restartBtn = document.getElementById('restart-btn');

let progress = 0;
let isScanning = false;
let stream = null;

startBtn.addEventListener('click', async function() {
    startScreen.classList.add('hidden');
    await initCamera();
});

document.getElementById('close-btn').addEventListener('click', function() {
    location.reload();
});

restartBtn.addEventListener('click', function() {
    location.reload();
});

async function initCamera() {
    try {
        stream = await navigator.mediaDevices.getUserMedia({
            video: { 
                facingMode: 'user',
                width: { ideal: 1280 },
                height: { ideal: 720 }
            },
            audio: false
        });
        
        video.srcObject = stream;
        
        video.onloadedmetadata = function() {
            initFaceDetection();
        };
        
    } catch(err) {
        info.textContent = 'Camera non disponible';
        instructions.textContent = 'Verifiez les permissions';
        console.error(err);
    }
}

function initFaceDetection() {
    const faceMesh = new FaceMesh({locateFile: function(file) {
        return 'https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/' + file;
    }});

    faceMesh.setOptions({
        maxNumFaces: 1,
        refineLandmarks: true,
        minDetectionConfidence: 0.5,
        minTrackingConfidence: 0.5
    });

    faceMesh.onResults(function(results) {
        if (!isScanning && results.multiFaceLandmarks && results.multiFaceLandmarks.length > 0) {
            var landmarks = results.multiFaceLandmarks[0];
            var nose = landmarks[1];
            var leftEye = landmarks[33];
            var rightEye = landmarks[263];
            var chin = landmarks[152];
            var forehead = landmarks[10];
            
            var faceCenterX = (leftEye.x + rightEye.x) / 2;
            var faceCenterY = (forehead.y + chin.y) / 2;
            var faceWidth = Math.abs(rightEye.x - leftEye.x);
            var faceHeight = Math.abs(chin.y - forehead.y);
            
            var offsetX = faceCenterX - 0.5;
            var offsetY = faceCenterY - 0.45;

            var isCentered = Math.abs(offsetX) < 0.06 && Math.abs(offsetY) < 0.08;
            var isGoodSize = faceWidth > 0.18 && faceWidth < 0.32;
            var isUpright = faceHeight > faceWidth * 1.0;

            if (isCentered && isGoodSize && isUpright) {
                oval.className = 'success scanning';
                info.textContent = 'Ne bouge pas...';
                info.style.color = '#00C853';
                instructions.textContent = 'Analyse en cours';
                
                progress = Math.min(progress + 3, 100);
                progressBar.style.width = progress + '%';
                
                if (progress >= 100 && !isScanning) {
                    isScanning = true;
                    startCountdown();
                }
            } else {
                oval.className = 'error';
                progress = 0;
                progressBar.style.width = '0%';
                
                if (!isGoodSize && faceWidth < 0.18) {
                    info.textContent = 'Rapproche-toi';
                    info.style.color = '#FF5252';
                    instructions.textContent = 'Ton visage est trop petit';
                } else if (!isGoodSize && faceWidth > 0.32) {
                    info.textContent = 'Eloigne-toi';
                    info.style.color = '#FF5252';
                    instructions.textContent = 'Ton visage est trop grand';
                } else if (offsetX < -0.06) {
                    info.textContent = 'Tourne a droite';
                    info.style.color = 'white';
                } else if (offsetX > 0.06) {
                    info.textContent = 'Tourne a gauche';
                    info.style.color = 'white';
                } else if (offsetY < -0.08) {
                    info.textContent = 'Descends un peu';
                    info.style.color = 'white';
                } else if (offsetY > 0.08) {
                    info.textContent = 'Monte un peu';
                    info.style.color = 'white';
                } else {
                    info.textContent = 'Centre ton visage';
                    info.style.color = 'white';
                }
            }
        } else if (!isScanning) {
            oval.className = 'error';
            info.textContent = 'Aucun visage detecte';
            info.style.color = 'white';
            instructions.textContent = 'Place ton visage dans le cadre';
            progress = 0;
            progressBar.style.width = '0%';
        }
    });

    function detect() {
        if (!isScanning) {
            faceMesh.send({image: video}).then(function() {
                requestAnimationFrame(detect);
            });
        }
    }
    detect();
}

function startCountdown() {
    var count = 3;
    countdownEl.style.display = 'block';
    countdownEl.textContent = count;
    
    var interval = setInterval(function() {
        count--;
        if (count > 0) {
            countdownEl.textContent = count;
        } else {
            clearInterval(interval);
            countdownEl.style.display = 'none';
            capturePhoto();
        }
    }, 1000);
}

function capturePhoto() {
    var canvas = document.createElement('canvas');
    canvas.width = video.videoWidth;
    canvas.height = video.videoHeight;
    var ctx = canvas.getContext('2d');
    
    ctx.translate(canvas.width, 0);
    ctx.scale(-1, 1);
    ctx.drawImage(video, 0, 0);
    
    var dataURL = canvas.toDataURL('image/jpeg', 0.9);
    resultImg.src = dataURL;
    
    if (stream) {
        stream.getTracks().forEach(function(track) {
            track.stop();
        });
    }
    
    resultScreen.classList.add('show');
}
</script>

</body>
</html>
